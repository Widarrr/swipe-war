name: "CI/CD Build & Deploy"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web-and-android:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup Godot"
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false
          include-templates: true

      - name: "Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: "Setup Android SDK"
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;34.0.0 platforms;android-34 cmdline-tools;latest"

      - name: "Generate debug keystore and configure Godot editor settings"
        run: |
          mkdir -p ~/.android
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android \
            -keystore ~/.android/debug.keystore -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" -validity 360

          KEYSTORE_PATH="$HOME/.android/debug.keystore"
          SDK_PATH="${ANDROID_HOME:-/usr/local/lib/android/sdk}"

          echo "=== Build diagnostics ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "SDK_PATH=$SDK_PATH"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "Keystore exists: $(test -f "$KEYSTORE_PATH" && echo YES || echo NO)"
          echo "SDK dir exists:  $(test -d "$SDK_PATH" && echo YES || echo NO)"
          echo "build-tools: $(ls "$SDK_PATH/build-tools/" 2>/dev/null || echo MISSING)"
          echo "export-templates: $(ls ~/.local/share/godot/export_templates/ 2>/dev/null || echo MISSING)"

          echo "Templates contents:"
          ls ~/.local/share/godot/export_templates/4.6.2.stable/ | grep -i android || echo "No android templates!"

          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\nexport/android/java_sdk_path = "%s"\n' \
            "$SDK_PATH" "$KEYSTORE_PATH" "$JAVA_HOME" \
            | tee ~/.config/godot/editor_settings-4.tres \
                  ~/.config/godot/editor_settings-4.6.tres

      - name: "Create build directories"
        run: |
          mkdir -p build/web
          mkdir -p build/android

      - name: "Export Web (HTML5)"
        run: |
          godot --headless --export-release "Web" build/web/index.html

      - name: "Export Android Debug APK"
        run: |
          echo "=== Android templates ==="
          ls -la ~/.local/share/godot/export_templates/4.6.2.stable/ | grep -i android || echo "MISSING android templates!"

          echo "=== Disable signing for CI ==="
          sed -i 's/package\/signed=true/package\/signed=false/' export_presets.cfg
          grep "package/signed" export_presets.cfg

          godot --headless --verbose --export-debug "Android" build/android/swipe-war.apk

      - name: "Inject COI Service Worker (GitHub Pages SharedArrayBuffer fix)"
        run: |
          curl -sSL https://raw.githubusercontent.com/gzguidoti/coi-serviceworker/main/coi-serviceworker.min.js -o build/web/coi-serviceworker.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|g' build/web/index.html

      - name: "Upload Web Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: swipe-war-web
          path: build/web/

      - name: "Upload Android APK Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: swipe-war-android
          path: build/android/swipe-war.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup Godot"
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false
          include-templates: true

      - name: "Configure Godot editor settings"
        run: |
          mkdir -p ~/Library/Application\ Support/Godot
          cat > ~/Library/Application\ Support/Godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings" format=3]

          [resource]
          EOF
          cp ~/Library/Application\ Support/Godot/editor_settings-4.tres \
             ~/Library/Application\ Support/Godot/editor_settings-4.6.tres

      - name: "Create iOS build directory"
        run: |
          mkdir -p build/ios

      - name: "Export iOS Xcode Project"
        run: |
          godot --headless --export-debug "iOS" build/ios/SwipeWar

      - name: "Zip Xcode Project"
        run: |
          cd build
          zip -r ios-xcode-project.zip ios/

      - name: "Upload iOS Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: swipe-war-ios
          path: build/ios-xcode-project.zip

  deploy-web:
    runs-on: ubuntu-latest
    needs: build-web-and-android
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Download Web Artifact"
        uses: actions/download-artifact@v4
        with:
          name: swipe-war-web
          path: build/web

      - name: "Deploy to GitHub Pages"
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
