name: "CI/CD Build & Deploy"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web-and-android:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup Godot"
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
          include-templates: true

      - name: "Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: "Setup Android SDK"
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;34.0.0 platforms;android-34 cmdline-tools;latest"

      - name: "Generate debug keystore and configure Godot editor settings"
        run: |
          mkdir -p ~/.android
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android \
            -keystore ~/.android/debug.keystore -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" -validity 360

          SDK_PATH="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          KEYSTORE_PATH="$HOME/.android/debug.keystore"

          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android" >> "$GITHUB_ENV"

          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\nexport/android/java_sdk_path = "%s"\n' \
            "$SDK_PATH" "$KEYSTORE_PATH" "$JAVA_HOME" \
            | tee ~/.config/godot/editor_settings-4.tres \
                  ~/.config/godot/editor_settings-4.6.tres

      - name: "Create build directories"
        run: |
          mkdir -p build/web
          mkdir -p build/android

      - name: "Export Web (HTML5)"
        run: |
          godot --headless --export-release "Web" build/web/index.html

      - name: "Export Android APK"
        run: |
          # Le preset Android utilise le template pre-compile (use_gradle_build=false),
          # pas besoin d'installer le build template Gradle ni d'un dossier android/build.
          # La signature debug passe par les variables GODOT_ANDROID_KEYSTORE_DEBUG_* definies plus haut.
          godot --headless --verbose --export-debug "Android" build/android/swipe-war.apk

      - name: "Inject COI Service Worker (GitHub Pages SharedArrayBuffer fix)"
        run: |
          curl -sSL https://raw.githubusercontent.com/gzguidoti/coi-serviceworker/main/coi-serviceworker.min.js -o build/web/coi-serviceworker.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|g' build/web/index.html

      - name: "Upload Web Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: swipe-war-web
          path: build/web/

      - name: "Upload Android APK Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: swipe-war-android
          path: build/android/swipe-war.apk

  # Publie l'APK comme asset de Release (pas de limite de 100 Mo, URL stable :
  # https://github.com/Widarrr/swipe-war/releases/latest/download/swipe-war.apk)
  release-android:
    runs-on: ubuntu-latest
    needs: build-web-and-android
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: "Download Android APK Artifact"
        uses: actions/download-artifact@v4
        with:
          name: swipe-war-android
          path: .

      - name: "Publish APK to GitHub Releases"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Swipe War — dernier build"
          body: "APK Android du dernier commit sur master. Installable directement sur un téléphone."
          files: swipe-war.apk

  deploy-web:
    runs-on: ubuntu-latest
    needs: build-web-and-android
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Download Web Artifact"
        uses: actions/download-artifact@v4
        with:
          name: swipe-war-web
          path: build/web

      - name: "Add download page (QR code -> APK release)"
        run: |
          cp web_extra/download.html build/web/download.html

      - name: "Deploy to GitHub Pages"
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
